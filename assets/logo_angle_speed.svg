<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="180" height="60" viewBox="0 0 180 60" role="img" aria-label="SportSync angled logo with speedline">
  <defs>
    <linearGradient id="gradBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e63e0"/>
      <stop offset="1" stop-color="#4a89ff"/>
    </linearGradient>
  </defs>
  <!-- speedline -->
  <polyline points="0,40 60,20 120,6 180,0" fill="none" stroke="url(#gradBlue)" stroke-width="4" stroke-linecap="round" />
  <!-- angled wordmark (stylized) -->
  <text x="8" y="40" font-family="Arial Black, Arial, sans-serif" font-size="28" fill="url(#gradBlue)" transform="rotate(-8 40 40)">SPORTSYNC</text>
  <!-- live indicator dot -->
  <circle cx="30" cy="18" r="6" fill="#ff3b30">
    <animate attributeName="r" from="6" to="9" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>
