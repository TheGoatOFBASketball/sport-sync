<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline' https://fonts.bunny.net https://cdnjs.cloudflare.com; font-src 'self' https://fonts.bunny.net https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:8000 https://site.api.espn.com https://site.web.api.espn.com https://sports.core.api.espn.com https://www.thesportsdb.com https://api.rss2json.com https://api.allorigins.win https://balldontlie.io https://v3.football.api-sports.io; frame-ancestors 'none'; base-uri 'self'">
  <title>NHL Hub | SPORTSYNC</title>
  <link rel="stylesheet" href="index.css" />
  <script src="espn-api.js" defer></script>
  <script src="thesportsdb-api.js" defer></script>
</head>
<body>
  <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</a>
  <main class="nba-page hub-content">
    <section class="hub-hero" id="hub-hero-nhl" aria-label="NHL Hub Hero">
      <div class="hub-hero-inner">
        <h1 class="hub-hero-title">NHL Hub</h1>
        <p class="hub-hero-subtitle">Live scores, standings, news, and schedule</p>
      </div>
      <div class="hub-hero-live" id="heroLiveStripNHL"></div>
    </section>
    <section class="sec">
      <div class="nba-hero" style="padding:20px 24px; text-align:left;">
        <h1>NHL Hub</h1>
        <p>Live NHL scores, standings, and hockey headlines</p>
      </div>
      <div class="nba-grid" style="grid-template-columns: 1fr 1fr; gap:20px;">
        <div class="nba-card" id="live-scores">
          <div class="nba-card-header"><h3><i class="fa-solid fa-hockey-puck"></i> Live NHL Scores</h3><span class="live-indicator"><span class="live-dot"></span> LIVE</span></div>
          <div class="game-list" id="nhl-live" style="padding:12px;"></div>
        </div>
        <div class="nba-card" id="nhl-news">
          <div class="nba-card-header"><h3><i class="fa-solid fa-newspaper"></i> NHL News</h3></div>
          <div id="nhl-news-list" style="padding:12px; font-size:0.9rem; color:var(--t2);"></div>
        </div>
      </div>
    </section>
    <section class="sec" id="nhl-standings">
      <div class="sec-bar"><h2><span class="ab"></span> Standings</h2></div>
      <div class="standings" id="nhl-standings"></div>
    </section>
  </main>
  <script>
    function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
(async function(){
      try{
        const nhlData = await SPORTSYNC_API.ESPN.getScoreboard('nhl');
        const games = nhlData?.events || [];
        const container = document.getElementById('nhl-live');
        if (container && games.length){
          container.innerHTML = games.map(g => {
            const home = g.home?.abbr ?? g.home?.name ?? '';
            const away = g.away?.abbr ?? g.away?.name ?? '';
            const hs = g.home?.score ?? g.home?.points ?? '';
            const as = g.away?.score ?? g.away?.points ?? '';
            return `<div class="game-item live"><div class="game-teams"><span class="team-name">${esc(away)}</span></div><div class="game-score">${esc(hs)} - ${esc(as)}</div><div class="game-teams" style="justify-content:flex-end"><span class="team-name">${esc(home)}</span></div></div>`;
          }).join('');
        }
      } catch(e){ console.error(e); }
      const newsList = document.getElementById('nhl-news-list'); if (newsList) newsList.innerHTML = '<div>NHL: Headlines placeholder.</div>';
      // Standings (NHL)
      try {
        const standings = await SPORTSYNC_API.ESPN.getStandings('nhl');
        const stand = document.getElementById('nhl-standings');
        if (stand && Array.isArray(standings)) {
          stand.innerHTML = standings.map(s => `
            <div class="standings-row" aria-label="${esc(s.name)} standings">
              <span class="rank">${esc(s.rank)}</span>
              <span class="team-name">${esc(s.name)} <span class="team-abbr">${esc(s.abbr || '')}</span></span>
              <span class="stat">${esc(s.wins)}-${esc(s.losses)}</span>
              <span class="stat">${esc(s.gb ?? '')}</span>
              <span class="stat">${esc(s.pct ?? '')}</span>
            </div>`).join('');
        }
      } catch(_){ }
    })();
  </script>
</body>
</html>
