<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLB Hub | SPORTSYNC</title>
  <link rel="stylesheet" href="index.css" />
  <script src="espn-api.js" defer></script>
  <script src="thesportsdb-api.js" defer></script>
</head>
<body>
  <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</a>
  <main class="nba-page">
    <section class="sec">
      <div class="nba-hero" style="padding:20px 24px; text-align:left;">
        <h1>MLB Hub</h1>
        <p>Your home for live MLB scores, standings, and news</p>
      </div>
      <div class="nba-grid" style="grid-template-columns: 1fr 1fr; gap:20px;">
        <div class="nba-card" id="live-scores">
          <div class="nba-card-header"><h3><i class="fa-solid fa-baseball"></i> Live MLB Scores</h3><span class="live-indicator"><span class="live-dot"></span> LIVE</span></div>
          <div class="game-list" id="mlb-live" style="padding:12px;"></div>
        </div>
        <div class="nba-card" id="mlb-news">
          <div class="nba-card-header"><h3><i class="fa-solid fa-newspaper"></i> MLB News</h3></div>
          <div id="mlb-news-list" style="padding:12px; font-size:0.9rem; color:var(--t2);"></div>
        </div>
      </div>
    </section>
    <section class="sec" id="mlb-standings">
      <div class="sec-bar"><h2><span class="ab"></span> Standings</h2></div>
      <div class="standings" id="mlb-standings"></div>
    </section>
  </main>
  <script>
    (async function(){
      try{
        // ESPN MLB scoreboard if available
        const mlbData = await API.ESPN.getScoreboard('mlb');
        const games = mlbData?.events ?? [];
        const container = document.getElementById('mlb-live');
        if (container && games.length) {
          container.innerHTML = games.map(g => {
            const home = g.home?.abbr ?? g.home?.name ?? '';
            const away = g.away?.abbr ?? g.away?.name ?? '';
            const hs = g.home?.score ?? g.home?.points ?? '';
            const as = g.away?.score ?? g.away?.points ?? '';
            return `<div class="game-item live"><div class="game-teams"><span class="team-name">${away}</span></div><div class="game-score">${hs} - ${as}</div><div class="game-teams" style="justify-content:flex-end"><span class="team-name">${home}</span></div></div>`;
          }).join('');
        }
      } catch(e){ console.error(e); }
      const newsList = document.getElementById('mlb-news-list'); if (newsList) newsList.innerHTML = '<div>MLB: Breaking news placeholder.</div>';
    })();
  </script>
</body>
</html>
